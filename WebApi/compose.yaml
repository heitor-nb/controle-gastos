services:
  api:
    build: .
    container_name: web-api
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ConnectionStrings__Default: ${DEFAULT_CONNECTION_STRING}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: web-api-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - web_api_pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    restart: unless-stopped

volumes:
  web_api_pg_data: